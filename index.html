<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Question Walkthroughs</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- JS-YAML for parsing YAML files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    <style>
        /* Custom styles for transitions and drag-drop */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .highlight-segment { transition: all 0.3s ease; }
        .drag-over { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        
        /* Smooth scrolling for anchor links if needed */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- Header & Drag/Drop Zone -->
    <header id="drop-zone" class="bg-white border-b-4 border-blue-600 shadow-sm p-8 text-center transition-colors duration-200 border-dashed border-2 m-4 rounded-xl border-gray-300 bg-gray-50 cursor-pointer">
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Interactive Exam Walkthroughs</h1>
        <p class="text-gray-500 mb-4">Use the Next/Previous buttons to step through how the marks were gained.</p>
        <div class="inline-flex items-center justify-center px-4 py-2 bg-blue-50 text-blue-700 rounded-lg font-medium text-sm">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
            Drag & Drop YAML files here to add them
        </div>
    </header>

    <!-- Container for the loaded questions -->
    <main id="questions-container" class="flex-grow max-w-7xl mx-auto w-full p-4 space-y-8 pb-20">
        <!-- Questions will be injected here via JavaScript -->
    </main>

    <script>
        // ==========================================
        // CONFIGURATION
        // Add your GitHub RAW URLs or other endpoints here.
        // ==========================================
        
        // ---- YOUR URLS GO HERE ----
        const YAML_URLS = [
            "https://raw.githubusercontent.com/jquinney-hue/j2778marker/refs/heads/main/questions.yaml"
        ];

        // Global state object to keep track of active steps for each question
        const walkthroughState = {};

        // ==========================================
        // APPLICATION LOGIC
        // ==========================================

        document.addEventListener('DOMContentLoaded', () => {
            // Load initial URLs
            YAML_URLS.forEach(url => fetchAndParseYaml(url));
            setupDragAndDrop();
        });

        // 1. Fetching Logic
        async function fetchAndParseYaml(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const yamlText = await response.text();
                processYamlContent(yamlText);
            } catch (error) {
                console.error("Error fetching YAML from", url, error);
                showToast(`Failed to load URL: ${url}`, "error");
            }
        }

        // 2. Drag & Drop Logic
        function setupDragAndDrop() {
            const dropZone = document.getElementById('drop-zone');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
                document.body.addEventListener(eventName, preventDefaults, false);
            });

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
            });

            dropZone.addEventListener('drop', handleDrop, false);
        }

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            
            [...files].forEach(file => {
                if(file.name.endsWith('.yaml') || file.name.endsWith('.yml')) {
                    const reader = new FileReader();
                    reader.onload = (event) => processYamlContent(event.target.result);
                    reader.onerror = () => showToast(`Error reading file ${file.name}`, "error");
                    reader.readAsText(file);
                } else {
                    showToast("Please drop only .yaml or .yml files.", "error");
                }
            });
        }

        // 3. Processing and Rendering
        function processYamlContent(yamlText) {
            try {
                // In js-yaml v4, loadAll returns an array of documents directly
                const documents = jsyaml.loadAll(yamlText);
                
                documents.forEach((parsedData) => {
                    if (parsedData) {
                        validateSchema(parsedData);
                        renderQuestion(parsedData);
                    }
                });
            } catch (error) {
                console.error("YAML Parse Error:", error);
                showToast("Invalid YAML format or schema.", "error");
            }
        }

        function validateSchema(data) {
            if (!data.question || !data.question.id || !data.answer || !data.walkthrough) {
                throw new Error("Missing required schema fields (question, answer, walkthrough).");
            }
        }

        function renderQuestion(data) {
            const container = document.getElementById('questions-container');
            const qId = data.question.id;
            
            // Initialize state for this specific question
            walkthroughState[qId] = {
                steps: data.walkthrough.steps,
                currentIndex: 0
            };

            const card = document.createElement('article');
            card.className = "bg-white rounded-xl shadow-md overflow-hidden border border-gray-200";
            
            let html = `
                <!-- Header -->
                <div class="bg-gray-800 text-white p-4 flex justify-between items-center">
                    <div>
                        <h2 class="text-xl font-bold">${qId}: ${data.metadata.topic || 'Exam Question'}</h2>
                        <span class="text-sm text-gray-300">${data.metadata.exam_board || ''} ${data.metadata.paper_code || ''}</span>
                    </div>
                    <div class="bg-blue-600 px-3 py-1 rounded-full text-sm font-bold shadow-inner">
                        Max Marks: ${data.metadata.max_marks}
                    </div>
                </div>

                <div class="p-6">
                    <!-- Question Prompt -->
                    <div class="mb-8 bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
                        <h3 class="font-bold text-blue-900 mb-2 uppercase text-sm tracking-wider">Question</h3>
                        <p class="text-gray-800 whitespace-pre-wrap font-medium">${data.question.prompt}</p>
                        
                        ${data.question.requirements ? `
                        <ul class="list-disc list-inside mt-3 text-gray-700">
                            ${data.question.requirements.map(req => `<li>${req}</li>`).join('')}
                        </ul>
                        ` : ''}
                    </div>

                    <!-- Split View for Answer and Walkthrough -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        
                        <!-- Answer Column -->
                        <div class="border border-gray-200 rounded-lg overflow-hidden flex flex-col">
                            <div class="bg-gray-100 p-3 border-b border-gray-200 font-bold text-gray-700 uppercase text-xs tracking-wider">
                                Student Answer
                            </div>
                            <div class="p-5 text-gray-800 leading-relaxed text-lg flex-grow">
                                ${renderAnswerSegments(qId, data.answer.segments)}
                            </div>
                        </div>

                        <!-- Walkthrough Stepper Column -->
                        <div class="border border-gray-200 rounded-lg overflow-hidden flex flex-col">
                            <div class="bg-gray-100 p-3 border-b border-gray-200 font-bold text-gray-700 uppercase text-xs tracking-wider flex justify-between items-center">
                                <span>Examiner Walkthrough</span>
                                <span class="text-indigo-600 font-bold">${data.walkthrough.total_marks_awarded}/${data.metadata.max_marks} Marks (${data.walkthrough.band_achieved})</span>
                            </div>
                            <div class="p-6 flex-grow bg-gray-50 flex flex-col justify-between">
                                
                                <!-- Dynamic Step Content -->
                                <div id="step-content-${qId}" class="min-h-[140px] flex items-center">
                                    <!-- Injected via updateStepView() -->
                                </div>
                                
                                <!-- Stepper Controls -->
                                <div class="mt-6 flex items-center justify-between border-t border-gray-200 pt-5">
                                    <button id="btn-prev-${qId}" class="px-4 py-2 bg-white border border-gray-300 rounded shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                        &larr; Previous
                                    </button>
                                    <span id="step-progress-${qId}" class="text-sm font-bold text-gray-500"></span>
                                    <button id="btn-next-${qId}" class="px-4 py-2 bg-indigo-600 text-white border border-transparent rounded shadow-sm text-sm font-medium hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                                        Next &rarr;
                                    </button>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            `;

            card.innerHTML = html;
            container.appendChild(card);
            
            // Set up button listeners
            document.getElementById(`btn-prev-${qId}`).addEventListener('click', () => {
                if (walkthroughState[qId].currentIndex > 0) {
                    walkthroughState[qId].currentIndex--;
                    updateStepView(qId);
                }
            });

            document.getElementById(`btn-next-${qId}`).addEventListener('click', () => {
                if (walkthroughState[qId].currentIndex < walkthroughState[qId].steps.length - 1) {
                    walkthroughState[qId].currentIndex++;
                    updateStepView(qId);
                }
            });

            // Initialize the first step view
            updateStepView(qId);
        }

        // Generate the HTML for the answer, injecting spans for highlights
        function renderAnswerSegments(qId, segments) {
            return segments.map(seg => {
                if (seg.highlight_id) {
                    // Added border-transparent to prevent layout shifts when highlighting adds a border
                    return `<span id="seg-${qId}-${seg.highlight_id}" class="highlight-segment rounded px-1 mx-0 border border-transparent">${seg.text}</span>`;
                } else {
                    return `<span>${seg.text}</span>`;
                }
            }).join('');
        }

        // Handles rendering the correct step and applying highlights
        function updateStepView(qId) {
            const state = walkthroughState[qId];
            const step = state.steps[state.currentIndex];
            const totalSteps = state.steps.length;

            // 1. Update the explanation content
            const contentContainer = document.getElementById(`step-content-${qId}`);
            contentContainer.innerHTML = `
                <div class="flex items-start w-full transition-opacity duration-300">
                    <div class="flex-shrink-0 bg-indigo-100 text-indigo-700 rounded-full w-10 h-10 flex items-center justify-center font-bold mr-4 border border-indigo-200 text-lg shadow-sm">
                        ${step.step_number}
                    </div>
                    <div class="flex-grow">
                        <p class="text-base text-gray-800 leading-relaxed font-medium">${step.explanation}</p>
                        <div class="mt-3">
                            <span class="inline-block text-sm font-bold px-3 py-1 bg-green-100 text-green-800 rounded-full border border-green-200 shadow-sm">
                                +${step.marks_gained} Mark${step.marks_gained > 1 ? 's' : ''} Gained
                            </span>
                        </div>
                    </div>
                </div>
            `;

            // 2. Update Progress Counter & Buttons
            document.getElementById(`step-progress-${qId}`).textContent = `Step ${state.currentIndex + 1} of ${totalSteps}`;
            document.getElementById(`btn-prev-${qId}`).disabled = state.currentIndex === 0;
            document.getElementById(`btn-next-${qId}`).disabled = state.currentIndex === totalSteps - 1;

            // 3. Manage Text Highlights in the Answer Column
            // First, clear all existing highlights for this specific question
            document.querySelectorAll(`span[id^="seg-${qId}-"]`).forEach(el => {
                el.classList.remove('bg-yellow-200', 'text-yellow-900', 'shadow-sm', 'border-yellow-400');
                el.classList.add('border-transparent');
            });

            // Then, apply highlight to the current step's target span
            if (step.highlight_id) {
                const targetSpan = document.getElementById(`seg-${qId}-${step.highlight_id}`);
                if (targetSpan) {
                    targetSpan.classList.remove('border-transparent');
                    targetSpan.classList.add('bg-yellow-200', 'text-yellow-900', 'shadow-sm', 'border-yellow-400');
                }
            }
        }

        // Simple toast notification for errors
        function showToast(message, type = "info") {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded shadow-lg text-white font-medium transition-opacity duration-300 opacity-0 z-50 ${type === 'error' ? 'bg-red-600' : 'bg-gray-800'}`;
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            requestAnimationFrame(() => toast.classList.remove('opacity-0'));
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
