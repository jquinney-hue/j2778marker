question:
  id: Q5-NETWORKS
  prompt: |
    Describe the differences between a client-server network and a peer-to-peer network.
  requirements:
    - Describe Client-Server
    - Describe Peer-to-Peer
metadata:
  topic: Computer Networks
  exam_board: OCR
  paper_code: J277/01
  max_marks: 4
answer:
  segments:
    - text: "In a client-server network, "
    - text: "there is a central server that manages the network, and client computers connect to it to request resources or files."
      highlight_id: "cs-1"
    - text: " "
    - text: "Security and backups are managed centrally by the server."
      highlight_id: "cs-2"
    - text: "\n\nIn a peer-to-peer network, "
    - text: "all computers have equal status and there is no central server."
      highlight_id: "p2p-1"
    - text: " "
    - text: "Each computer is responsible for its own security and its own backups."
      highlight_id: "p2p-2"
walkthrough:
  total_marks_awarded: 4
  band_achieved: "Full Marks"
  steps:
    - step_number: 1
      highlight_id: "cs-1"
      explanation: "Accurately describes the central role of the server providing resources."
      marks_gained: 1
    - step_number: 2
      highlight_id: "cs-2"
      explanation: "Identifies a key characteristic of client-server (centralised management/backups)."
      marks_gained: 1
    - step_number: 3
      highlight_id: "p2p-1"
      explanation: "Accurately contrasts P2P by stating all nodes are equal with no central authority."
      marks_gained: 1
    - step_number: 4
      highlight_id: "p2p-2"
      explanation: "Contrasts the management aspect by stating users must manage their own backups/security."
      marks_gained: 1

