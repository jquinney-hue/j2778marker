question:
  id: Q6-SECURITY
  prompt: |
    Explain what is meant by a 'Brute Force Attack' and describe one method a company could use to protect its network against it.
  requirements:
    - Explain brute force attack
    - Describe a prevention method
metadata:
  topic: Network Security
  exam_board: AQA
  paper_code: Paper 1
  max_marks: 4
answer:
  segments:
    - text: "A brute force attack is when "
    - text: "a hacker uses a programme to automatically try every possible combination of passwords"
      highlight_id: "brute-1"
    - text: " until they find the correct one to gain access to an account.\n\n"
    - text: "To protect against it, a company could "
    - text: "implement an account lockout policy."
      highlight_id: "prev-1"
    - text: " "
    - text: "This locks the account after 3 failed login attempts, stopping the automated programme from continuing to guess."
      highlight_id: "prev-2"
walkthrough:
  total_marks_awarded: 3
  band_achieved: "Mid Level"
  steps:
    - step_number: 1
      highlight_id: "brute-1"
      explanation: "Defines brute force accurately (automated trial and error of passwords)."
      marks_gained: 1
    - step_number: 2
      highlight_id: "prev-1"
      explanation: "Identifies a valid prevention method (account lockout)."
      marks_gained: 1
    - step_number: 3
      highlight_id: "prev-2"
      explanation: "Explains *how* the method stops the attack. Missing a 4th mark for not mentioning strong passwords (increasing time taken to crack) or CAPTCHA."
      marks_gained: 1

