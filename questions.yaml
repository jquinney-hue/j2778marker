question:
  id: Q4-STORAGE
  prompt: |
    A student is buying a new laptop for school work and playing games. Discuss the advantages and disadvantages of choosing a Solid State Drive (SSD) rather than a Magnetic Hard Disk Drive (HDD).
  requirements:
    - State advantages of SSD
    - State disadvantages of SSD vs HDD
    - Relate to context (school work / games)
metadata:
  topic: Memory and Storage
  exam_board: Edexcel
  paper_code: Paper 1
  max_marks: 6
answer:
  segments:
    - text: "An advantage of an SSD is that "
    - text: "it has much faster read and write speeds than an HDD."
      highlight_id: "adv-1"
    - text: " "
    - text: "This is great for the student because it means their laptop will boot up faster and their games will have shorter loading screens."
      highlight_id: "adv-2"
    - text: " Also, "
    - text: "SSDs have no moving parts, so they are more durable and won't break easily if the student drops their laptop in their school bag."
      highlight_id: "adv-3"
    - text: "\n\nA disadvantage is that "
    - text: "SSDs are more expensive per Gigabyte than HDDs."
      highlight_id: "dis-1"
    - text: " Therefore, "
    - text: "the student might have to settle for a smaller capacity drive, which could be an issue if modern games take up a lot of storage space."
      highlight_id: "dis-2"
walkthrough:
  total_marks_awarded: 5
  band_achieved: "High Level"
  steps:
    - step_number: 1
      highlight_id: "adv-1"
      explanation: "Identifies a technical advantage (faster read/write speeds)."
      marks_gained: 1
    - step_number: 2
      highlight_id: "adv-2"
      explanation: "Contextualises the speed advantage perfectly to the scenario (faster game loading times/boot times)."
      marks_gained: 1
    - step_number: 3
      highlight_id: "adv-3"
      explanation: "Identifies a second advantage (durability/no moving parts) and relates to carrying it to school."
      marks_gained: 1
    - step_number: 4
      highlight_id: "dis-1"
      explanation: "Correctly identifies a major disadvantage (cost per GB)."
      marks_gained: 1
    - step_number: 5
      highlight_id: "dis-2"
      explanation: "Contextualises the disadvantage (smaller capacity for large games). Missed out on a 6th mark for not mentioning HDD lifespan or data recovery."
      marks_gained: 1

