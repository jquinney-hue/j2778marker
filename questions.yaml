question:
  id: Q10-LANGUAGES
  prompt: |
    Explain the difference between a high-level and a low-level programming language. Give one advantage of using each.
  requirements:
    - Difference between high and low level
    - Advantage of high level
    - Advantage of low level
metadata:
  topic: Translators and Languages
  exam_board: AQA
  paper_code: Paper 2
  max_marks: 6
answer:
  segments:
    - text: "A high-level language is written in English-like words, whereas "
    - text: "a low-level language is written in machine code (binary) or assembly language, which is closer to the hardware."
      highlight_id: "diff-1"
    - text: " "
    - text: "High-level languages must be translated by a compiler or interpreter before the computer can run them, but machine code does not."
      highlight_id: "diff-2"
    - text: "\n\nAn advantage of high-level languages is that "
    - text: "they are much easier for humans to read, write, and debug,"
      highlight_id: "adv-hl"
    - text: " so it is faster to programme a game.\n\n"
    - text: "An advantage of low-level languages is that "
    - text: "they give the programmer direct control over the CPU and memory,"
      highlight_id: "adv-ll1"
    - text: " "
    - text: "which means the code executes much faster and takes up less memory."
      highlight_id: "adv-ll2"
walkthrough:
  total_marks_awarded: 5
  band_achieved: "High Level"
  steps:
    - step_number: 1
      highlight_id: "diff-1"
      explanation: "Accurately distinguishes between the two based on their proximity to hardware / human language."
      marks_gained: 1
    - step_number: 2
      highlight_id: "diff-2"
      explanation: "Provides a second distinction regarding the need for translation."
      marks_gained: 1
    - step_number: 3
      highlight_id: "adv-hl"
      explanation: "Identifies a clear advantage of high-level languages (programmer efficiency/readability)."
      marks_gained: 1
    - step_number: 4
      highlight_id: "adv-ll1"
      explanation: "Identifies an advantage of low-level languages (hardware control)."
      marks_gained: 1
    - step_number: 5
      highlight_id: "adv-ll2"
      explanation: "Expands on the low-level advantage with a performance benefit (execution speed / memory footprint). Student missed the 6th mark by not mentioning portability (high-level is portable across OS, low-level is machine specific)."
      marks_gained: 1
