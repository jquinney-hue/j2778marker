      highlight_id: "mark_ethical_2"
      marks_gained: 2
      explanation: "Provides a strong counter-argument regarding discrimination, showing excellent contextual understanding."
    - step_number: 3
      highlight_id: "mark_legal_1"
      marks_gained: 1
      explanation: "Correctly identifies the DPA in relation to storing user data."
    - step_number: 4
      highlight_id: "mark_legal_2"
