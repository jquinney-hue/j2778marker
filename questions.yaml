question:
  id: Q2-EWASTE
  prompt: |
    People often want to buy the most up-to-date smartphones, even though the smartphone they own still works.
    
    Discuss the impact of people wanting to upgrade to the latest smartphone.
    
    In your answer, you might consider the impact on:
    • smartphone users
    • cultural issues
    • ethical issues
    • environmental issues.
  requirements:
    - Mention smartphone users
    - Mention cultural/ethical issues
    - Mention environmental issues
    - Weigh up both sides
metadata:
  topic: Ethical, Legal & Environmental
  exam_board: OCR
  paper_code: J277/01
  max_marks: 8
answer:
  segments:
    - text: "Upgrading smartphones constantly has several impacts. Environmentally, "
    - text: "modern phones are poorly designed for durability and cannot be easily upgraded by the user."
      highlight_id: "env-1"
    - text: " Because people throw away perfectly working phones, "
    - text: "it leads to massive amounts of e-waste in landfills."
      highlight_id: "env-2"
    - text: " "
    - text: "This toxic waste can leak into the land and water, often in developing countries where the waste is sent."
      highlight_id: "env-3"
    - text: "\n\nCulturally and ethically, "
    - text: "there is a desire to own the newest device just to fit in with peers."
      highlight_id: "cult-1"
    - text: " This puts a lot of "
    - text: "social pressure on parents to spend money they might not have"
      highlight_id: "eth-1"
    - text: " just so their children aren't bullied for having old technology. This widens the digital and social divide. "
    - text: "However, for the smartphone users themselves, a benefit is that they get new features that might make their work or leisure activities much more efficient."
      highlight_id: "user-1"
walkthrough:
  total_marks_awarded: 7
  band_achieved: "Mark Band 3 - High Level"
  steps:
    - step_number: 1
      highlight_id: "env-1"
      explanation: "Identifies the issue with manufacturer design (planned obsolescence / lack of upgradeability)."
      marks_gained: 1
    - step_number: 2
      highlight_id: "env-2"
      explanation: "Clearly links the upgrading habit to the creation of e-waste and landfill usage."
      marks_gained: 1
    - step_number: 3
      highlight_id: "env-3"
      explanation: "Expands on the environmental point by mentioning toxic waste and the impact abroad. Very strong point."
      marks_gained: 1
    - step_number: 4
      highlight_id: "cult-1"
      explanation: "Hits the cultural aspect - the peer pressure and desire to fit in."
      marks_gained: 1
    - step_number: 5
      highlight_id: "eth-1"
      explanation: "Hits the ethical aspect by discussing financial pressure on parents and the potential for bullying/social divide."
      marks_gained: 2
    - step_number: 6
      highlight_id: "user-1"
      explanation: "Provides a balanced view by mentioning the positive impact on the user (new features for work/leisure). Highly structured and relevant."
      marks_gained: 1

