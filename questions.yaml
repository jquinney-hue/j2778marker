question:
  id: "Q4"
  prompt: >
    Consumers are increasingly upgrading their smartphones every 1 to 2 years, discarding their old devices.
    
    Discuss the impacts of this rapid upgrade cycle.
  requirements:
    - "Environmental impacts"
    - "Cultural impacts"

answer:
  segments:
    - text: "The trend of rapidly upgrading smartphones has severe consequences. "
    - highlight_id: "mark_env_1"
      text: "Environmentally, discarded phones contribute to massive amounts of e-waste in landfills, where toxic chemicals like lead and battery acid can leak into the soil and water. "
    - highlight_id: "mark_env_2"
      text: "Furthermore, manufacturing millions of new phones yearly heavily depletes finite natural resources, as rare earth metals must be continuously mined. "
    - highlight_id: "mark_cult_1"
      text: "Culturally, this trend widens the digital divide, creating inequality between those who can afford the latest technology and those who cannot. "
    - highlight_id: "mark_cult_2"
      text: "It also creates intense social pressure and consumerism, especially among teenagers, who may feel bullied or left out if they do not have the newest smartphone model. "
    - highlight_id: "mark_conclusion"
      text: "In conclusion, while consumers enjoy new features, the devastating cost to the environment and the negative social pressures far outweigh the benefits."

walkthrough:
  total_marks_awarded: 8
  band_achieved: "Band 3 (High Level)"
  steps:
    - step_number: 1
      highlight_id: "mark_env_1"
      marks_gained: 2
      explanation: "Clearly explains the environmental issue of e-waste and the specific danger of toxic chemical leakage."
    - step_number: 2
      highlight_id: "mark_env_2"
      marks_gained: 2
      explanation: "Provides a second environmental point regarding the depletion of natural resources and mining."
    - step_number: 3
      highlight_id: "mark_cult_1"
      marks_gained: 1
      explanation: "Identifies the cultural impact of the digital divide and inequality."
    - step_number: 4
      highlight_id: "mark_cult_2"
      marks_gained: 2
      explanation: "Expands on cultural impacts by discussing social pressure, consumerism, and bullying."
    - step_number: 5
      highlight_id: "mark_conclusion"
      marks_gained: 1
      explanation: "Offers a strong, justified conclusion that weighs the impacts, securing the top band."

