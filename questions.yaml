question:
  id: Q3-CPU
  prompt: |
    Explain how the cache size, clock speed, and number of cores affect the performance of a CPU.
  requirements:
    - Explain Cache Size
    - Explain Clock Speed
    - Explain Number of Cores
metadata:
  topic: Systems Architecture
  exam_board: AQA
  paper_code: Paper 1
  max_marks: 6
answer:
  segments:
    - text: "Cache is memory built into the CPU that is faster than RAM. "
    - text: "A larger cache size means more frequently used data and instructions can be stored closer to the CPU, meaning it doesn't have to wait for the slower RAM as often, improving performance."
      highlight_id: "cache"
    - text: "\n\nClock speed is how many cycles the CPU can do per second. "
    - text: "A higher clock speed means more instructions can be fetched, decoded and executed every second."
      highlight_id: "clock"
    - text: "\n\nFinally, the number of cores is how many processing units the CPU has. "
    - text: "More cores allow for parallel processing, meaning multiple instructions can be processed at the exact same time, speeding up multitasking."
      highlight_id: "cores"
walkthrough:
  total_marks_awarded: 6
  band_achieved: "Full Marks"
  steps:
    - step_number: 1
      highlight_id: "cache"
      explanation: "Correctly identifies what cache stores (frequently used data) AND explains the performance benefit (reduces fetch time from RAM). Awards 2 marks."
      marks_gained: 2
    - step_number: 2
      highlight_id: "clock"
      explanation: "Correctly defines clock speed's impact on performance (more FDE cycles / instructions per second). Awards 2 marks."
      marks_gained: 2
    - step_number: 3
      highlight_id: "cores"
      explanation: "Correctly explains that multiple cores allow parallel processing/multitasking, executing multiple instructions simultaneously. Awards 2 marks."
      marks_gained: 2

