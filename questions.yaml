question:
  id: "Q2"
  prompt: >
    Social networking websites use artificial intelligence (AI) to automatically monitor posts and images uploaded by users. 
    
    Discuss the positive and negative uses of AI by social networking websites.
  requirements:
    - "Legal issues"
    - "Ethical issues"
    - "Privacy issues"

answer:
  segments:
    - text: "The use of AI to monitor posts has significant implications. "
    - highlight_id: "mark_legal_1"
      text: "Legally, AI helps the platform enforce the Copyright Designs and Patents Act by instantly flagging and removing plagiarized or copyrighted videos. "
    - highlight_id: "mark_legal_2"
      text: "However, the platform must ensure the AI complies with the Data Protection Act by not using the scanned personal data for unauthorized purposes. "
    - highlight_id: "mark_ethical_1"
      text: "Ethically, AI works 24/7 to rapidly identify and remove harmful content like cyberbullying, creating a safer environment. "
    - text: "Conversely, "
    - highlight_id: "mark_ethical_2"
      text: "AI lacks human context and may incorrectly block legitimate posts, which can be seen as unfair censorship. "
    - highlight_id: "mark_privacy_1"
      text: "From a privacy perspective, continuous AI monitoring creates a feeling of constant surveillance, even though users technically agree to this in the Terms and Conditions."

walkthrough:
  total_marks_awarded: 8
  band_achieved: "Band 3 (High Level)"
  steps:
    - step_number: 1
      highlight_id: "mark_legal_1"
      marks_gained: 2
      explanation: "Identifies the Copyright Act and provides a positive application of AI (removing stolen content)."
    - step_number: 2
      highlight_id: "mark_legal_2"
      marks_gained: 1
      explanation: "Identifies the DPA and relates it to the negative risk of unauthorized data use."
    - step_number: 3
      highlight_id: "mark_ethical_1"
      marks_gained: 2
      explanation: "Explains a positive ethical impact (removing harmful content / cyberbullying rapidly)."
    - step_number: 4
      highlight_id: "mark_ethical_2"
      marks_gained: 1
      explanation: "Explains a negative ethical impact (false positives / unfair censorship)."
    - step_number: 5
      highlight_id: "mark_privacy_1"
      marks_gained: 2
      explanation: "Addresses the privacy requirement, noting the feeling of surveillance and referencing Terms and Conditions."

