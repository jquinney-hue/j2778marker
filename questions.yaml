question:
  id: Q7-OS
  prompt: |
    Describe the role of the operating system in managing memory and managing peripherals.
  requirements:
    - Describe memory management
    - Describe peripheral management
metadata:
  topic: Systems Software
  exam_board: OCR
  paper_code: J277/01
  max_marks: 4
answer:
  segments:
    - text: "For memory management, the OS "
    - text: "allocates space in the RAM for programmes that are currently open."
      highlight_id: "mem-1"
    - text: " "
    - text: "It also uses virtual memory when the RAM is full by moving inactive data to the hard drive."
      highlight_id: "mem-2"
    - text: "\n\nFor peripheral management, the OS "
    - text: "uses device drivers to communicate with external hardware like printers."
      highlight_id: "per-1"
    - text: " "
    - text: "It sends data to buffers so the CPU doesn't have to wait for a slow printer to finish."
      highlight_id: "per-2"
walkthrough:
  total_marks_awarded: 4
  band_achieved: "Full Marks"
  steps:
    - step_number: 1
      highlight_id: "mem-1"
      explanation: "Correctly states that the OS allocates RAM to active processes."
      marks_gained: 1
    - step_number: 2
      highlight_id: "mem-2"
      explanation: "Expands on memory management by mentioning the handling of virtual memory."
      marks_gained: 1
    - step_number: 3
      highlight_id: "per-1"
      explanation: "Correctly identifies the use of device drivers for peripheral communication."
      marks_gained: 1
    - step_number: 4
      highlight_id: "per-2"
      explanation: "Provides a deeper technical point regarding peripheral management (use of buffers/spooling)."
      marks_gained: 1

