question:
  id: "Q1"
  prompt: >
    A family decides to install voice-activated smart speakers in every room of their house. 
    The devices are connected to the internet, control the home's heating and lighting, 
    and continuously listen for a "wake word" to process commands via the manufacturer's cloud servers.
    
    Discuss the impact of the family installing these voice-activated smart devices in their home.
  requirements:
    - "ethical issues"
    - "privacy issues"
    - "legal issues"

answer:
  segments:
    - text: "The installation of smart speakers in the home introduces several new impacts. "
    - highlight_id: "mark_legal_1"
      text: "Legally, the manufacturer of the smart speaker must comply with the Data Protection Act (DPA). "
    - text: "Because the devices process user data in the cloud, "
    - highlight_id: "mark_legal_2"
      text: "the data must be kept securely to prevent breaches, and the family must agree to terms and conditions regarding data usage. "
    - highlight_id: "mark_ethical_1"
      text: "Ethically, a positive impact is that the devices provide significant accessibility benefits, allowing users with mobility issues to control heating easily. "
    - text: "However, "
    - highlight_id: "mark_privacy_1"
      text: "a negative privacy issue is that the devices are 'always listening' for a wake word, making users and unaware guests feel like they are under constant surveillance in their own home. "
    - highlight_id: "mark_conclusion"
      text: "Overall, the family must weigh the immense convenience and accessibility benefits against the severe privacy risks of continuous audio monitoring."

walkthrough:
  total_marks_awarded: 8
  band_achieved: "Band 3 (High Level)"
  steps:
    - step_number: 1
      highlight_id: "mark_legal_1"
      marks_gained: 1
      explanation: "Identifies a relevant piece of legislation (Data Protection Act) applicable to the context."
    - step_number: 2
      highlight_id: "mark_legal_2"
      marks_gained: 2
      explanation: "Expands on the legal point by explaining the requirements of the DPA (keeping data secure, terms and conditions)."
    - step_number: 3
      highlight_id: "mark_ethical_1"
      marks_gained: 2
      explanation: "Provides a balanced view by introducing a positive ethical impact (accessibility/mobility benefits)."
    - step_number: 4
      highlight_id: "mark_privacy_1"
      marks_gained: 2
      explanation: "Identifies a negative privacy issue ('always listening' / surveillance of guests). Covers the final required bullet point."
    - step_number: 5
      highlight_id: "mark_conclusion"
      marks_gained: 1
      explanation: "Provides a well-developed conclusion weighing both sides of the argument, achieving maximum marks."

