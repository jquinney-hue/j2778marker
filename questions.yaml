question:
  id: Q1-MEDTECH
  prompt: |
    The use of digital technology in medicine is constantly evolving.
    
    Discuss the impact of digital technology on medicine including:
    • diagnosing patients
    • treating patients
    • storage of records.
  requirements:
    - Discuss diagnosing
    - Discuss treating
    - Discuss record storage
    - Provide a balanced argument
metadata:
  topic: Ethical, Legal & Environmental
  exam_board: OCR
  paper_code: J277/01
  max_marks: 8
answer:
  segments:
    - text: "Digital technology has a massive impact on medicine. For diagnosing patients, "
    - text: "AI and automated equipment can be used to quickly search through records and identify patterns of symptoms"
      highlight_id: "diag-1"
    - text: ", which means diseases can be spotted faster than a human doctor could. However, "
    - text: "if the software has an error or bias, it might miss some symptoms and give incorrect results."
      highlight_id: "diag-2"
    - text: "\n\nWhen treating patients, "
    - text: "automated robotic surgery allows patients to be operated on by specialists who are in a completely different country."
      highlight_id: "treat-1"
    - text: " A negative of this is that "
    - text: "there is less human interaction which can be scary for the patient, and if the network drops or gets hacked, it could be fatal."
      highlight_id: "treat-2"
    - text: "\n\nFinally, for storing records, "
    - text: "centralised cloud storage means any medical professional involved in care can access the patient's history immediately."
      highlight_id: "store-1"
    - text: " But "
    - text: "putting all this sensitive data in one central place creates a huge target for hackers, raising major privacy concerns if personal data is leaked."
      highlight_id: "store-2"
walkthrough:
  total_marks_awarded: 8
  band_achieved: "Mark Band 3 - High Level"
  steps:
    - step_number: 1
      highlight_id: "diag-1"
      explanation: "Excellent point regarding diagnosis. The student identifies the ability of AI to find patterns faster than humans (indicative content: identify patterns/more accurate)."
      marks_gained: 1
    - step_number: 2
      highlight_id: "diag-2"
      explanation: "Shows balanced discussion by providing a negative impact for diagnosis (indicative content: may miss symptoms/incorrect results)."
      marks_gained: 1
    - step_number: 3
      highlight_id: "treat-1"
      explanation: "Strong application to treatment. Identifies remote surgery as a key benefit (indicative content: access to specialists not local)."
      marks_gained: 1
    - step_number: 4
      highlight_id: "treat-2"
      explanation: "Again, balances the argument by discussing the risks of remote/automated treatment, including hacking and lack of human touch."
      marks_gained: 2
    - step_number: 5
      highlight_id: "store-1"
      explanation: "Addresses the third bullet point clearly. Mentions centralised storage allowing widespread access for care professionals."
      marks_gained: 1
    - step_number: 6
      highlight_id: "store-2"
      explanation: "Concludes with strong security and privacy concerns regarding centralised storage. Overall, thorough knowledge, well-structured, covers all areas."
      marks_gained: 2

