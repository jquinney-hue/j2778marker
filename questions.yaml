question:
  id: "Q5"
  prompt: >
    A school is deciding whether to use Proprietary software or Open Source software for its computer science lessons. 
    
    Discuss the legal and ethical impacts of the school choosing Open Source software instead of Proprietary software.
  requirements:
    - "Legal issues"
    - "Ethical issues"

answer:
  segments:
    - text: "Choosing open source software over proprietary software has major impacts for a school. "
    - highlight_id: "mark_legal_1"
      text: "Legally, proprietary software is heavily restricted by the Copyright Designs and Patents Act, meaning it would be illegal for the school to share copies with students. "
    - highlight_id: "mark_legal_2"
      text: "Conversely, open source software legally permits users to view, modify, and distribute the source code without breaking copyright laws. "
    - highlight_id: "mark_ethical_1"
      text: "Ethically, choosing open source promotes equality; all students can legally download the software for free at home, regardless of their family's financial situation. "
    - highlight_id: "mark_ethical_2"
      text: "Furthermore, because the source code is public, it is ethically more transparent, as experts can check the code to ensure it isn't secretly collecting student data. "
    - highlight_id: "mark_conclusion"
      text: "Overall, open source is the most ethical and legally flexible choice for an educational environment."

walkthrough:
  total_marks_awarded: 8
  band_achieved: "Band 3 (High Level)"
  steps:
    - step_number: 1
      highlight_id: "mark_legal_1"
      marks_gained: 2
      explanation: "Identifies the Copyright Act and explains the legal restrictions of proprietary software."
    - step_number: 2
      highlight_id: "mark_legal_2"
      marks_gained: 2
      explanation: "Explains the legal freedoms associated with open source software (modify, distribute)."
    - step_number: 3
      highlight_id: "mark_ethical_1"
      marks_gained: 2
      explanation: "Provides a strong ethical argument regarding equality and free access for students at home."
    - step_number: 4
      highlight_id: "mark_ethical_2"
      marks_gained: 1
      explanation: "Adds an ethical point regarding transparency and data privacy."
    - step_number: 5
      highlight_id: "mark_conclusion"
      marks_gained: 1
      explanation: "A clear, justified conclusion referencing both legal and ethical domains."
