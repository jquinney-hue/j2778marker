question:
  id: "Q3"
  prompt: >
    A health insurance company offers cheaper premiums to customers who wear a smartwatch. The smartwatch monitors their daily exercise, heart rate, and GPS location, sending this data back to the company.
    
    Discuss the issues surrounding this use of wearable technology.
  requirements:
    - "Ethical issues"
    - "Legal issues"
    - "Privacy issues"

answer:
  segments:
    - text: "Using smartwatches for health insurance premiums creates several debates. "
    - highlight_id: "mark_ethical_1"
      text: "Ethically, a positive impact is that it financially incentivizes customers to lead a healthier lifestyle and exercise more. "
    - text: "However, "
    - highlight_id: "mark_ethical_2"
      text: "it is highly unethical because it discriminates against disabled or elderly individuals who cannot easily exercise, forcing them to pay higher premiums. "
    - highlight_id: "mark_legal_1"
      text: "Legally, the insurance company must strictly adhere to the Data Protection Act. "
    - highlight_id: "mark_legal_2"
      text: "Because health data is highly sensitive, it must be kept extremely secure to prevent hackers from stealing it. "
    - highlight_id: "mark_privacy_1"
      text: "Privacy is a major concern, as the GPS tracker means the company knows the user's exact location at all times, leading to a loss of personal anonymity."

walkthrough:
