question:
  id: Q9-ALGORITHMS
  prompt: |
    Describe the steps involved in performing a binary search on an array of integers. What is a key requirement of the array before a binary search can be performed?
  requirements:
    - State the array requirement
    - Describe the steps of the algorithm
metadata:
  topic: Algorithms
  exam_board: Edexcel
  paper_code: Paper 2
  max_marks: 5
answer:
  segments:
    - text: "Before a binary search can be performed, "
    - text: "the array must be sorted into alphabetical or numerical order."
      highlight_id: "req"
    - text: "\n\nFirst, "
    - text: "you find the middle item of the array and compare it to the target item you are looking for."
      highlight_id: "step-1"
    - text: " "
    - text: "If the middle item is the target, you stop."
      highlight_id: "step-2"
    - text: " "
    - text: "If the target is smaller than the middle item, you discard the right half of the array."
      highlight_id: "step-3"
    - text: " Then you just keep repeating this process on the remaining half until the item is found."
walkthrough:
  total_marks_awarded: 4
  band_achieved: "Mid-High Level"
  steps:
    - step_number: 1
      highlight_id: "req"
      explanation: "Correctly identifies the prerequisite condition: the list must be ordered/sorted."
      marks_gained: 1
    - step_number: 2
      highlight_id: "step-1"
      explanation: "Identifies the first step of finding the midpoint and comparing it."
      marks_gained: 1
    - step_number: 3
      highlight_id: "step-2"
      explanation: "Identifies the base case / stopping condition."
      marks_gained: 1
    - step_number: 4
      highlight_id: "step-3"
      explanation: "Correctly describes discarding half the list based on a size comparison. Missed the 5th mark by not explicitly stating that you must recalculate a new midpoint for the remaining half."
      marks_gained: 1

